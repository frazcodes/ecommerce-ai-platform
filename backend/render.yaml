services:
  - type: web
    name: smartcart-ai-backend
    runtime: python
    plan: free
    buildCommand: pip install --prefer-binary -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PIP_PREFER_BINARY
        value: 1
      - key: CARGO_HOME
        value: /tmp/cargo
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: False
      - key: MONGODB_URI
        generateValue: true
      - key: MONGODB_DATABASE
        value: smartcart_db
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://your-frontend-url.vercel.app
    healthCheckPath: /api/v1/health
